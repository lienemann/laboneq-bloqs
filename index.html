<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#111827" />
    <meta name="description" content="Visually compose LabOneQ quantum experiments in your browser. Privacy-preserving, offline-capable." />
    <meta name="referrer" content="no-referrer" />
    <link rel="icon" type="image/svg+xml" href="/laboneq-bloqs/favicon.svg" />
    <link rel="apple-touch-icon" href="/laboneq-bloqs/icons/icon-192.png" />
    <title>LabOneQ Bloqs</title>
  </head>
  <body>
    <div id="app">
      <header class="toolbar" role="toolbar" aria-label="Main toolbar">
        <div class="toolbar-title">
          <strong>LabOneQ&nbsp;Bloqs</strong>
          <span class="toolbar-sub">visual experiment editor</span>
        </div>
        <div class="toolbar-actions">
          <button type="button" id="btn-copy" title="Copy generated Python">Copy</button>
          <button type="button" id="btn-download" title="Download as experiment.py">Download</button>
          <span class="toolbar-sep" aria-hidden="true"></span>
          <button type="button" id="btn-export" title="Export workspace as JSON">Export</button>
          <button type="button" id="btn-import" title="Import workspace from JSON">Import</button>
          <input type="file" id="file-import" accept=".json,application/json" hidden />
          <span class="toolbar-sep" aria-hidden="true"></span>
          <button type="button" id="btn-clear" title="Clear workspace">Clear</button>
        </div>
      </header>
      <main class="panels">
        <section id="blockly-panel" class="panel panel-blocks" aria-label="Block editor"></section>
        <section class="panel panel-code" aria-label="Generated Python code">
          <div class="code-header">
            <span>experiment.py</span>
            <span id="code-status" class="code-status" aria-live="polite"></span>
          </div>
          <pre class="code-pre"><code id="code-output" class="language-python"></code></pre>
        </section>
      </main>
      <footer class="statusbar">
        <span>Runs entirely in your browser. No network calls, no tracking.</span>
        <span id="sw-status" class="sw-status" aria-live="polite"></span>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
